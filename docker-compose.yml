version: '3.9'

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: go-jobs-api
    ports:
      - "3000:3000"
    volumes:
      - ./api:/app
    working_dir: /app
    command: ["go", "run", "./cmd"]

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: go-jobs-app
    ports:
      - "4200:4200"
    volumes:
      - ./app:/app
      - /app/node_modules
    working_dir: /app
    command: ["sh", "-c", "npm install && npm run start -- --host 0.0.0.0 --port 4200 --poll 1000"]
    depends_on:
      - api
